<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Calendario UCV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="dashboard" class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="home-btn" onclick="goHome()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <h3 class="sidebar-title">Cursos</h3>
        <div id="coursesList" class="courses-list"></div>
      </div>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </aside>

    <main class="main-panel">
      <!-- Home -->
      <section id="homeView" class="view-section active">
        <div class="header-profile">
          <img id="profileAvatar" src="" alt="" class="profile-avatar" />
          <div class="profile-info">
            <h2 id="profileName"></h2>
            <p id="profileRole"></p>
          </div>
        </div>
        <div class="courses-overview">
          <h3>Tus Cursos</h3>
          <div id="homeCoursesGrid" class="courses-grid"></div>
        </div>
      </section>

      <!-- Curso -->
      <section id="courseView" class="view-section">
        <div class="course-header">
          <button class="btn-back" onclick="goHome()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Volver
          </button>
          <h2 id="courseTitle"></h2>
        </div>
        <div class="course-calendar">
          <div class="calendar-controls">
            <button class="cal-nav-btn" onclick="previousMonth()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h3 id="monthYearDisplay"></h3>
            <button class="cal-nav-btn" onclick="nextMonth()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="calendar-grid" id="courseCalendarGrid"></div>
        </div>
        <!-- FAB admin -->
        <button id="fabCreateEvent" class="fab-create-event" onclick="openCreateEventModal()" style="display:none;" title="Crear evento">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </section>

      <!-- Evento detalle -->
      <section id="eventView" class="view-section">
        <button class="btn-back" onclick="backToCalendar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Volver al calendario
        </button>
        <div class="event-detail">
          <div id="eventDetailColorBar" class="event-detail-color-bar"></div>
          <h2 id="eventDetailTitle"></h2>
          <div class="event-meta">
            <span id="eventDetailType" class="event-tag"></span>
            <span id="eventDetailDate" class="meta-chip"></span>
            <span id="eventDetailAuthor" class="meta-chip"></span>
          </div>
          <p id="eventDetailDesc" class="event-desc-text"></p>

          <div class="task-completion" id="taskCompletionSection" style="display:none;">
            <h4>Estado de la tarea</h4>
            <div class="completion-controls">
              <button id="markCompletedBtn" class="completion-btn completed" onclick="toggleTaskCompletion(true)">
                <div class="check-shape"></div> Completada
              </button>
              <button id="markIncompleteBtn" class="completion-btn incomplete" onclick="toggleTaskCompletion(false)">
                <div class="x-shape"></div> No completada
              </button>
            </div>
            <div id="completionStatus" class="completion-status"></div>
          </div>

          <div class="event-reactions">
            <h4>Reacciones</h4>
            <div class="reaction-buttons">
              <button class="reaction-btn" onclick="addEventReaction('like')"><span class="react-shape like-shape"></span> Me gusta</button>
              <button class="reaction-btn" onclick="addEventReaction('love')"><span class="react-shape love-shape"></span> Me encanta</button>
              <button class="reaction-btn" onclick="addEventReaction('haha')"><span class="react-shape haha-shape"></span> Gracioso</button>
              <button class="reaction-btn" onclick="addEventReaction('wow')"><span class="react-shape wow-shape"></span> Wow</button>
              <button class="reaction-btn" onclick="addEventReaction('sad')"><span class="react-shape sad-shape"></span> Triste</button>
            </div>
          </div>
        </div>

        <div class="comments-section">
          <h3>Comentarios</h3>
          <div id="commentsList" class="comments-list"></div>
          <div class="comment-form">
            <textarea id="newComment" placeholder="Escribe un comentario..." rows="3"></textarea>
            <button onclick="submitComment()">Enviar</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ===== PANEL DESLIZANTE (día) ===== -->
  <div id="slideOverlay" class="slide-overlay" onclick="closeSlidePanel()"></div>
  <div id="slidePanel" class="slide-panel">
    <div class="slide-panel-header">
      <div>
        <div class="slide-panel-date-shape"></div>
        <h3 id="slidePanelTitle"></h3>
        <p id="slidePanelSub" class="slide-panel-sub"></p>
      </div>
      <button class="slide-close-btn" onclick="closeSlidePanel()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="slidePanelContent" class="slide-panel-content"></div>
  </div>

  <!-- ===== MODAL: CREAR CURSO ===== -->
  <div id="createCourseModal" class="modal-overlay" onclick="if(event.target===this)closeCreateCourseModal()">
    <div class="modal-content">
      <button class="close-modal" onclick="closeCreateCourseModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal-title-row">
        <div class="modal-icon-shape course-icon-shape"></div>
        <h3 class="modal-title">Nuevo Curso</h3>
      </div>
      <div class="form-grid">
        <input type="text" id="courseName" placeholder="Nombre del curso" />
        <textarea id="courseDescription" placeholder="Descripción (opcional)" rows="3"></textarea>
        <label class="form-label">Color</label>
        <div class="color-picker-row" id="courseColorPicker">
          <button type="button" class="color-dot selected" style="background:#7c6aff" data-color="#7c6aff" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#10b981" data-color="#10b981" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="selectCourseColor(this)"></button>
        </div>
        <input type="hidden" id="courseColor" value="#7c6aff" />
        <button type="button" class="btn-submit" onclick="submitCreateCourse()">Crear Curso</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: CREAR EVENTO ===== -->
  <div id="createEventModal" class="modal-overlay" onclick="if(event.target===this)closeCreateEventModal()">
    <div class="modal-content">
      <button class="close-modal" onclick="closeCreateEventModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal-title-row">
        <div class="modal-icon-shape event-icon-shape"></div>
        <h3 class="modal-title">Crear Evento</h3>
      </div>
      <form class="form-grid" onsubmit="createEvent(event)">
        <input type="text" id="eventTitle" placeholder="Título del evento" required />
        <textarea id="eventDesc" placeholder="Descripción (opcional)" rows="3"></textarea>
        <label class="form-label">Fecha</label>
        <input type="date" id="eventDate" required />
        <label class="form-label">Tipo</label>
        <div class="type-picker" id="typePicker">
          <button type="button" class="type-btn selected" data-type="tarea" onclick="selectType(this)">
            <div class="type-shape tarea-shape"></div>Tarea
          </button>
          <button type="button" class="type-btn" data-type="examen" onclick="selectType(this)">
            <div class="type-shape examen-shape"></div>Examen
          </button>
          <button type="button" class="type-btn" data-type="proyecto" onclick="selectType(this)">
            <div class="type-shape proyecto-shape"></div>Proyecto
          </button>
          <button type="button" class="type-btn" data-type="exposicion" onclick="selectType(this)">
            <div class="type-shape exposicion-shape"></div>Exposicion
          </button>
          <button type="button" class="type-btn" data-type="otro" onclick="selectType(this)">
            <div class="type-shape otro-shape"></div>Otro
          </button>
        </div>
        <input type="hidden" id="eventType" value="tarea" />
        <label class="form-label">Color</label>
        <div class="color-picker-row" id="eventColorPicker">
          <button type="button" class="color-dot selected" style="background:#7c6aff" data-color="#7c6aff" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#10b981" data-color="#10b981" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="selectEventColor(this)"></button>
        </div>
        <input type="hidden" id="eventColor" value="#7c6aff" />
        <button type="submit" class="btn-submit">Crear Evento</button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
  <script>
    fetch('/auth/me')
      .then(r => r.json())
      .then(user => {
        if (user.error) window.location.href = '/';
        else initializeDashboard(user);
      })
      .catch(() => window.location.href = '/');
  </script>
</body>
</html>

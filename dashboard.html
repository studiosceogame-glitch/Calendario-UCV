<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Calendario UCV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="dashboard" class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="home-btn" onclick="goHome()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <h3 class="sidebar-title">Cursos</h3>
        <div id="coursesList" class="courses-list"></div>
      </div>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </aside>

    <main class="main-panel">
      <!-- Home -->
      <section id="homeView" class="view-section active">
        <div class="header-profile">
          <img id="profileAvatar" src="" alt="" class="profile-avatar" />
          <div class="profile-info">
            <h2 id="profileName"></h2>
            <p id="profileRole"></p>
          </div>
        </div>
        <div class="courses-overview">
          <h3>Tus Cursos</h3>
          <div id="homeCoursesGrid" class="courses-grid"></div>
        </div>
      </section>

      <!-- Vista de Curso -->
      <section id="courseView" class="view-section">
        <div class="course-header">
          <button class="btn-back" onclick="goHome()">← Volver</button>
          <h2 id="courseTitle"></h2>
        </div>
        <div class="course-calendar">
          <div class="calendar-controls">
            <button onclick="previousMonth()">← Anterior</button>
            <h3 id="monthYearDisplay"></h3>
            <button onclick="nextMonth()">Siguiente →</button>
          </div>
          <div class="calendar-grid" id="courseCalendarGrid"></div>
        </div>
        <!-- FAB solo admin -->
        <button id="fabCreateEvent" class="fab-create-event" onclick="openCreateEventModal()" style="display:none;" title="Crear evento">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </section>

      <!-- Vista de Evento -->
      <section id="eventView" class="view-section">
        <button class="btn-back" onclick="backToCalendar()">← Volver al calendario</button>
        <div class="event-detail">
          <div id="eventDetailColorBar" class="event-detail-color-bar"></div>
          <h2 id="eventDetailTitle"></h2>
          <div class="event-meta">
            <span id="eventDetailType" class="event-tag"></span>
            <span id="eventDetailDate"></span>
            <span id="eventDetailAuthor"></span>
          </div>
          <p id="eventDetailDesc"></p>

          <div class="task-completion" id="taskCompletionSection" style="display:none;">
            <h4>Estado de la tarea</h4>
            <div class="completion-controls">
              <button id="markCompletedBtn" class="completion-btn completed" onclick="toggleTaskCompletion(true)">✅ Completada</button>
              <button id="markIncompleteBtn" class="completion-btn incomplete" onclick="toggleTaskCompletion(false)">❌ No completada</button>
            </div>
            <div id="completionStatus" class="completion-status"></div>
          </div>

          <div class="event-reactions">
            <h4>¿Qué te parece esta actividad?</h4>
            <div class="reaction-buttons">
              <button class="reaction-btn" onclick="addEventReaction('like')">👍 Me gusta</button>
              <button class="reaction-btn" onclick="addEventReaction('love')">❤️ Me encanta</button>
              <button class="reaction-btn" onclick="addEventReaction('haha')">😂 Gracioso</button>
              <button class="reaction-btn" onclick="addEventReaction('wow')">😮 Wow</button>
              <button class="reaction-btn" onclick="addEventReaction('sad')">😢 Triste</button>
            </div>
          </div>
        </div>

        <div class="comments-section">
          <h3>Comentarios</h3>
          <div id="commentsList" class="comments-list"></div>
          <div class="comment-form">
            <textarea id="newComment" placeholder="Escribe un comentario..." rows="3"></textarea>
            <button onclick="submitComment()">Enviar</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ===== MODAL: CREAR CURSO ===== -->
  <div id="createCourseModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeCreateCourseModal()">
    <div class="modal-content">
      <button class="close-modal" onclick="closeCreateCourseModal()">✕</button>
      <h3 class="modal-title">🎓 Nuevo Curso</h3>
      <div class="event-form">
        <input type="text" id="courseName" placeholder="Nombre del curso" required />
        <textarea id="courseDescription" placeholder="Descripción (opcional)" rows="3"></textarea>
        <label class="form-label">Color del curso</label>
        <div class="color-picker-row">
          <button type="button" class="color-dot selected" style="background:#7c6aff" data-color="#7c6aff" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#10b981" data-color="#10b981" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="selectCourseColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="selectCourseColor(this)"></button>
        </div>
        <input type="hidden" id="courseColor" value="#7c6aff" />
        <button type="button" class="btn-submit-event" onclick="submitCreateCourse()">Crear Curso</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: CREAR EVENTO ===== -->
  <div id="createEventModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeCreateEventModal()">
    <div class="modal-content">
      <button class="close-modal" onclick="closeCreateEventModal()">✕</button>
      <h3 class="modal-title">➕ Crear Evento</h3>
      <form class="event-form" onsubmit="createEvent(event)">
        <input type="text" id="eventTitle" placeholder="Título del evento" required />
        <textarea id="eventDesc" placeholder="Descripción (opcional)" rows="3"></textarea>
        <label class="form-label">Fecha</label>
        <input type="date" id="eventDate" required />
        <label class="form-label">Tipo de actividad</label>
        <select id="eventType">
          <option value="tarea">📝 Tarea</option>
          <option value="examen">📋 Examen</option>
          <option value="proyecto">🗂 Proyecto</option>
          <option value="exposicion">🎤 Exposición</option>
          <option value="otro">📌 Otro</option>
        </select>
        <label class="form-label">Color del evento</label>
        <div class="color-picker-row">
          <button type="button" class="color-dot selected" style="background:#7c6aff" data-color="#7c6aff" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#10b981" data-color="#10b981" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="selectEventColor(this)"></button>
          <button type="button" class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="selectEventColor(this)"></button>
        </div>
        <input type="hidden" id="eventColor" value="#7c6aff" />
        <button type="submit" class="btn-submit-event">Crear Evento</button>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: EVENTOS DEL DÍA ===== -->
  <div id="dayEventsModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeDayModal()">
    <div class="modal-content">
      <button class="close-modal" onclick="closeDayModal()">✕</button>
      <h3 class="modal-title" id="dayModalTitle"></h3>
      <div id="dayEventsList" class="day-events"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
  <script>
    fetch('/auth/me')
      .then(r => r.json())
      .then(user => {
        if (user.error) window.location.href = '/';
        else initializeDashboard(user);
      })
      .catch(() => window.location.href = '/');
  </script>
</body>
</html>
